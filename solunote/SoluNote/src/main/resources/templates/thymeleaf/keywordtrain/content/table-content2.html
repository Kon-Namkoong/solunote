<div id = "tablePage">
	<div class="content_tit fullMeeting_tit" >
	    <div class="title">
	        <h2 th:text="${#messages.msg('sideMenu.keyword.subMenu2')}">키워드  Data 목록</h2>
	    </div> 
	<div th:replace="thymeleaf/keywordtrain/head_search :: headSearchFragment"></div>  
	</div>
	<!-- //공통 고정 타이틀 및 검색 -->
	
	<!-- 전체 회의록 -->
	<div class="content_desc content_fullMeeting">
	
	  	<div th:replace="thymeleaf/keywordtrain/page_button :: pageButtonFragment"></div> 
	  	
	    <div class="table_content">
	        <table class="table_title">
	            <thead>
	              <tr style="height: 40px; background-color: #F2F4F7;">
		                <th style="width: 2%;">
		                    <span class="all check-box">
		                        <img class="unchecked" th:src="@{/images/checck.svg}"/>
		                        <img class="checked" th:src="@{/images/checck_on.svg}"/>
		                    </span>
		                </th>
		                <th  style="width: 4%"><span th:text="${#messages.msg('keywordtrain.content3.th1')}">번호</span></th>
						<th  style="width: 5%"><span th:text="${#messages.msg('traindata_2.content2.th5')}">학습완료</span></th>
		                <th  style="width: 10%;"><span th:text="${#messages.msg('keywordtrain.content3.th2')}">제목</span></th>
		                <th  style="width: 5%;" th:text="${#messages.msg('keywordtrain.content3.th3')}">키워드</th>
		                <th  style="width: 33%;" >STT Text</th>
		                <th  style="width: 33%;" th:text="${#messages.msg('keywordtrain.content3.th4')}">정답문장</th>
		                <th  style="width: 8%;"><span th:text="${#messages.msg('keywordtrain.content3.th5')}">수정일</span></th>
				  </tr>                  
	            </thead>
	        </table>
	        <div class="tbl_scroll">
	            <table>
	                <tbody id="tableRow">
	                </tbody>
	            </table>
	            <div th:replace="fragments/page_indicator :: pageIndicatorFragment"></div>
	        </div>
	    </div>
	</div>
</div>
