<!-- 공통 고정 타이틀 및 검색 -->
<div id = "tablePage">
	<div class="content_tit fullMeeting_tit" th:switch="${liveMenu}">
	    <div class="title">
        	<h2 th:text="${#messages.msg('sideMenu.train.subMenu2')}">학습 Data 목록</h2>
        </div>
    	<div th:replace="thymeleaf/menu24/head_search :: headSearchFragment"></div>  
	</div>
	<!-- //공통 고정 타이틀 및 검색 -->
	
	<!-- 전체 회의록 -->
	<div class="content_desc content_fullMeeting">
	
	    <div th:replace="thymeleaf/menu24/page_button :: pageButtonFragment"></div> 

	    <div class="table_content">
	        <table class="table_title">
	            <thead>
		            <tr style="height: 40px; background-color: #F2F4F7;">
		                <th style="width: 2%;">
		                    <span class="all check-box">
		                        <img class="unchecked" th:src="@{/images/checck.svg}"/>
		                        <img class="checked" th:src="@{/images/checck_on.svg}"/>
		                    </span>
		                </th>
		                <th  style="width: 2%"><span th:text="${#messages.msg('menu24.content1.th1')}">번호</span></th>
		                <th  style="width: 5%"><span th:text="${#messages.msg('menu24.content2.th5')}">사용여부</span></th>
		                <th  style="width: 18%;"><span th:text="${#messages.msg('menu24.content1.th2')}">제목</span></th>
		                <th  style="width: 33%;" >STT Text</th>
		                <th  style="width: 33%;" th:text="${#messages.msg('menu24.content1.th3')}">정답문장</th>
		                <th  style="width: 7%;"><span th:text="${#messages.msg('menu24.content1.th4')}">수정일</span></th>
		            </tr>
	            </thead>
	        </table>
	        <div class="tbl_scroll">
	            <table>
	                <tbody id="tableRow">
	                </tbody>
	            </table>
	
	            <div th:replace="fragments/page_indicator :: pageIndicatorFragment"></div>
	        </div>
	    </div>
	</div>
</div>
<!-- //전체 회의록 -->
