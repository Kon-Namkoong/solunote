<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<title>Error Page</title>
</head>
<body>
	<div class="errorPage">
		<span class="errorHead">Error</span><br />
		<p th:text="${'status code    = ' + code}"> </p>
		<p th:text="${'status message = ' + status}"> </p>
		<p th:if="${message != ''}" th:text="${'erorr message  = ' + message}"> </p>
	</div>
</body>
</html>
