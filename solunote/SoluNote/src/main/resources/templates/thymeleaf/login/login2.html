		<form id="frmLogin" method="post" th:action="${#httpServletRequest.getContextPath()}+'/user/loginProcess'" style="margin-left: 55px;">
          <div class="iptgrp">
            <div class="iptbx">
              <input id="username" name="username" type="text"  placeholder="아이디를 입력해주세요.">
              <button type="button" class="rstbtn" id="clearInput"></button>
            </div>

            <div class="iptbx">
              <input type="password" id="password" name="password" placeholder="비밀번호를 입력해주세요.">
              <button type="button" class="visiblepwd" id="togglePassword"></button>
            </div>

            <div class="chkbx">
              <input type="checkbox" id="remember-box" name="remember-box">
              <label for="remember-box">아이디 기억하기</label>
            </div>

          </div>
          <button id="login-submit-btn" type="submit" class="lgbtn">로그인</button>
	    </form>

<script>

const togglePassword = document.getElementById('togglePassword');
const passwordInput = document.getElementById('password');
const clearInput = document.getElementById('clearInput');
const userIdInput = document.getElementById('username');

// 버튼 클릭 시 비밀번호 가시성 토글
togglePassword.addEventListener('click', function () {

  // 현재 비밀번호 입력 요소의 type 속성 확인
  const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';

  // type 속성 변경
  passwordInput.setAttribute('type', type);

  // visible 클래스 토글
  if (type === 'text') {
    togglePassword.classList.add('visible');
  } else {
    togglePassword.classList.remove('visible');
  }
});



// 일반 입력 필드 초기화 기능
clearInput.addEventListener('click', function () {
  // 입력 필드 초기화
	userIdInput.value = '';

  // 초기화 후 버튼 숨기기
  clearInput.classList.remove('visible');
});

// 입력 필드에 입력이 있을 때 초기화 버튼 표시
userIdInput.addEventListener('input', function () {
  if (userIdInput.value.length > 0) {
    clearInput.classList.add('visible');
  } else {
    clearInput.classList.remove('visible');
  }
});


document.addEventListener("DOMContentLoaded", function () {
  const lgStartButton = document.getElementById("lg-start");
  const tgbx = document.getElementById("tgbx");

lgStartButton.addEventListener("click", function () {
  
  // lgStartButton에 active 클래스가 있는지 확인
  if (lgStartButton.classList.contains("active")) {
    // active 클래스가 있으면 제거
    lgStartButton.classList.remove("active");
    tgbx.classList.remove("active");
  } else {
    // active 클래스가 없으면 추가
    lgStartButton.classList.add("active");
    tgbx.classList.add("active");
  }

});





});


// solutext를 처음에 숨기고 아래쪽에 위치
gsap.set("#solutext", { opacity: 0, y: 20 });

// 로고의 모든 경로를 초기 상태로 설정 (숨기기)
gsap.set("#solunote-logo path", { opacity: 0 });

// bx01을 처음에 숨기고 화면 왼쪽 밖에 위치시킴
gsap.set("#bx01", { opacity: 0, x: -50 });
gsap.set("#bx02", { opacity: 0, x: 80 });
gsap.set("#lg-start", { opacity: 0, y: 20 });

// solutext가 떠오르듯이 등장하는 애니메이션
gsap.to("#solutext", {
  opacity: 1,
  y: 0,
  duration: 0.8,
  delay: 0.4,
  ease: "power2.out",
  onComplete: function () {
    let tl = gsap.timeline({

      onComplete: function () {

        gsap.to("#bx02", {
          opacity: 1,
          x: 0,
          duration: 0.64,
          ease: "power2.out",
          onComplete: function () {
            $(".rightbx").addClass("vsx");

            gsap.to("#lg-start", {
              opacity: 1,
              y: 0,
              duration: 0.64,
              ease: "power2.out"
            });

          }

        });


      }


    });

    gsap.utils.toArray("#solunote-logo path").forEach(function (path, i) {
      const length = path.getTotalLength();
      path.style.strokeDasharray = length;
      path.style.strokeDashoffset = length;
      path.style.stroke = "#0046fd";
      path.style.strokeWidth = 1;
      path.style.fill = "none";

      // 경로가 나타나도록 설정
      tl.set(path, { opacity: 1 }, i * 0.16);

      // 경로를 따라 외곽선 그리기
      tl.to(path, {
        strokeDashoffset: 0,
        duration: 0.8,
        ease: "power2.inOut",
      }, i * 0.16);

      // 외곽선이 그려진 후 채우기
      tl.to(path, {
        fill: "#0046fd",
        duration: 0.8,
        ease: "power2.inOut"
      }, i * 0.24);

      // 외곽선 제거
      tl.to(path, {
        strokeWidth: 0,
        duration: 0.4,
        ease: "power2.inOut"
      }, i * 0.32);
    });


    // bx01의 애니메이션을 타임라인에 추가하여 전체 애니메이션이 끝나기 전에 실행
    tl.to("#bx01", {
      opacity: 1,
      x: 0,
      duration: 0.8,
      ease: "power2.out",
      onComplete: function () {

        gsap.to("#bx02", {
          opacity: 1,
          x: 0,
          duration: 0.64,
          ease: "power2.out",
          onComplete: function () {
            $(".rightbx").addClass("vsx");

            gsap.to("#lg-start", {
              opacity: 1,
              y: 0,
              duration: 0.64,
              ease: "power2.out"



            });

          }

        });


      }

    }, "-=1.4"); // 이전 애니메이션의 끝에서 1.4초 당겨서 실행

  }
});	
</script>

</html>
