<div  class="tbl_btns" th:fragment="pageButtonFragment">
	<div class="left_btns">
		<button th:if="${liveMenu} == '1'" id="trash-btn" class="choice_btn" th:text="${#messages.msg('menu25.page_button.btn2')}">선택삭제</button>
		<button th:if="${liveMenu} == '5'" id="ex-btn" class="choice_btn" th:text="${#messages.msg('menu25.page_button.btn3')}">선택제외</button></li>
		<button th:if="${liveMenu} == '5'" id="add-btn" class="choice_btn" th:text="${#messages.msg('menu25.page_button.btn1')}">선택사용</button></li>
	</div>
	<div class="tbl_right">
		<div class="table_total">[[${#messages.msg('menu21.page_button.page.span1')}]]  <span id="spanHiddenCount"></span>[[${#messages.msg('menu21.page_button.page.span2')}]] </div>
		<div class="select-container">
			<select th:if="${liveMenu} == '1'" name="page_count" class="custom-select" id="page_count">
				<option value="10" th:text="${#messages.msg('menu21.page_button.page1')}">10개씩</option>
				<option value="30" th:text="${#messages.msg('menu21.page_button.page2')}">30개씩</option>
				<option value="50" th:text="${#messages.msg('menu21.page_button.page3')}">50개씩</option>
				<option value="100" th:text="${#messages.msg('menu21.page_button.page4')}">100개씩</option>
			</select>
		</div>
		
		<div class="select-container">
			<select th:if="${liveMenu} == '5'" name="page_count_list" class="custom-select" id="page_count_list">
				<option value="10" th:text="${#messages.msg('menu21.page_button.page1')}">10개씩</option>
				<option value="30" th:text="${#messages.msg('menu21.page_button.page2')}">30개씩</option>
				<option value="50" th:text="${#messages.msg('menu21.page_button.page3')}">50개씩</option>
				<option value="100" th:text="${#messages.msg('menu21.page_button.page4')}">100개씩</option>
			</select>
		</div>		
		<button th:if="${liveMenu} == '1'" id="create-btn" class="upload_btn" th:text="${#messages.msg('menu21.page_button.btn1')}">등록</button>
	</div>
</div>
