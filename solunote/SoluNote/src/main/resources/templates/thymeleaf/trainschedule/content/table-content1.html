<!-- 공통 고정 타이틀 및 검색 -->
<div id = "tablePage">
	<div class="content_tit fullMeeting_tit" th:switch="${liveMenu}">
	    <div class="title">
        	<h2>학습일정</h2>
        </div>
    	<div th:replace="thymeleaf/trainschedule/head_search :: headSearchFragment"></div>  
	</div>
	<!-- //공통 고정 타이틀 및 검색 -->
	
	<!-- 전체 회의록 -->
	<div class="content_desc content_fullMeeting">
	
	    <div th:replace="thymeleaf/trainschedule/page_button :: pageButtonFragment"></div> 

	    <div class="table_content">
	        <table class="table_title">
				<thead>
	                <tr style="height: 40px; background-color: #F2F4F7;">
	                    <th style="width: 2%;">
	                        <span class="all check-box">
	                            <img class="unchecked" th:src="@{/images/checck.svg}"/>
	                            <img class="checked" th:src="@{/images/checck_on.svg}"/>
	                        </span>
	                    </th>				
						<th  style="width: 5%" th:text="${#messages.msg('trainschedule.content1.th1')}">번호</th>
						<th  style="width: 19%" th:text="${#messages.msg('trainschedule.content1.th2')}">학습예정 날짜</th>					
						<th  style="width: 19%" th:text="${#messages.msg('trainschedule.content1.th6')}">학습시작 시간</th>
						<th  style="width: 19%" th:text="${#messages.msg('trainschedule.content1.th7')}">학습종료 시간</th>
						<th  style="width: 15%" th:text="${#messages.msg('trainschedule.content1.th3')}">생성 시간</th	>					
						<th  style="width: 8%" th:text="${#messages.msg('trainschedule.content1.th4')}">상태</th>
						<th  style="width: 5%" th:text="${#messages.msg('trainschedule.content1.th5')}">성공</th>							
					</tr>
				</thead>
			</table>
	        <div class="tbl_scroll">
		        <table>
		            <thead>
		            <tbody id="tableRow">
		            </tbody>
		         </table>
	
	            <div th:replace="fragments/page_indicator :: pageIndicatorFragment"></div>
	        </div>
	    </div>
	    <div th:replace="thymeleaf/trainschedule/content/schedule :: scheduleFragment"></div>
	</div>
</div>
<!-- //전체 회의록 -->
