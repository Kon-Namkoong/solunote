<div  class="tbl_btns" th:fragment="pageButtonFragment">
	<div class="left_btns">
<button th:if="${liveMenu} == '1'" id="trash-btn" class="choice_btn" th:text="${#messages.msg('trainschedule.page_button.btn1')}">삭제</button>
	</div>
	<div class="tbl_right">
		<div class="table_total">[[${#messages.msg('minutes.page_button.page.span1')}]] <span id="tableTotal">0</span>[[${#messages.msg('minutes.page_button.page.span2')}]]</div>
		<div class="select-container">
			<select name="page_count" class="custom-select" id="page_count">
				<option value="10" th:text="${#messages.msg('minutes.page_button.page1')}">10개씩</option>
				<option value="30" th:text="${#messages.msg('minutes.page_button.page2')}">30개씩</option>
				<option value="50" th:text="${#messages.msg('minutes.page_button.page3')}">50개씩</option>
				<option value="100" th:text="${#messages.msg('minutes.page_button.page4')}">100개씩</option>
			</select>
		</div>
		<button th:if="${liveMenu} == '1'" id="create-btn" class="upload_btn" th:text="${#messages.msg('minutes.page_button.btn1')}">등록</button>
	</div>
</div>
