<tr  class="page-data-row " th:each="item, stat : ${cPages.content}" th:attr="data-seq=${item.seq}, data-useYn=${item.useYn}" >
	<td class="check-box" style="width: 2%;">
		<span>
			<img class="unchecked" th:src="@{/images/checck.svg}">
			<img class="checked" th:src="@{/images/checck_on.svg}">
		</span>
	</td>
    <td style="width: 4%;" th:text="${stat.count + (cPages.number - 1) * cPages.size}"></td>
    <td style="width: 5%;" th:class="${item.useYn == 'Y' ? (item.dataId == '' ? 'useTriangle' : 'useI') : (item.dataId == '' ? 'notUseI' : 'useI')}"></td>
	<td style="width: 10%;" th:text="${item.subject}"></td>
	<td style="width: 5%;" th:text="${item.keywordText}"></td>
	<td class="align_left" style="width: 33%;"><p class="trainingData_text" th:utext="${item.sttText}"></p></td>
	<td class="align_left" style="width: 33%;" ><p class="trainingData_text" th:utext="${item.trainText}"></p></td>
	<td style="width: 8%;" th:text="${item.updatedAt}"></td>
</tr> 	
<tr th:if="${cPages.isEmpty() == true}" class="page-data-row">
   <td colspan="7" class="align-middle">데이터가 없습니다.</td>
</tr>
<input type="hidden" id="hiddenCount" th:value="${hiddenCount}"></input>
<input type="hidden" id="hiddenPageSize" th:value="${cPages.pageable.pageSize}"></input>
