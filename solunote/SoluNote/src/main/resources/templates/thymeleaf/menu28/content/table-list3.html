<tr  class="page-data-row " th:each="item, stat : ${cPages.content}"  th:attr="data-seq=${item.seq}">
	<td style="width: 5%;" th:text="${stat.count + (cPages.number - 1) * cPages.size}"></td>
	<td style="width: 12%;" th:text="${item.subject}"></td>
	<td style="width: 7%;" th:text="${item.keywordText}"></td>
	<td style="width: 42%;" class="align_left" th:utext="${item.trainText}"></td>
	<td style="width: 5%;"  th:class="${item.useYn == 'Y' ? (item.dataId == '' ? 'useTriangle' : '') : (item.dataId == '' ? 'notUseI' : 'useI')}"></td>
	<td style="width: 13%;" th:text="${item.dataId}"></td>
	<td style="width: 5%;" th:text="${item.start}"></td>
	<td style="width: 5%;" th:text="${item.end}"></td>
	<td style="width: 7%;" th:text="${item.updatedAt}"></td>
</tr>
<tr th:if="${cPages.isEmpty() == true}" class="page-data-row">
   <td colspan="6" class="align-middle">데이터가 없습니다.</td>
</tr>
<input type="hidden" id="hiddenCount" th:value="${hiddenCount}"></input>
<input type="hidden" id="hiddenPageSize" th:value="${cPages.pageable.pageSize}"></input>
