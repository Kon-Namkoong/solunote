 <div id ="settingRegChange">
        <div class="common_content">
            <!-- 공통 고정 타이틀 및 검색 -->
            <div class="content_tit trainingDetail_tit content_detail_tit">
                <div class="title">
                    <a class="back_btn Change"><img th:src="@{/images/back_btn.svg}"></a>
                    <h2 th:text="${#messages.msg('mgmt.content2.change.h2')}">파일관리 수정</h2>
                </div>
            </div>
            <!-- //공통 고정 타이틀 및 검색 -->

            <!-- 파일관리 설정 등록 -->
            <div class="content_desc accountDetail_desc">
                <div class="tbl_btns accountDetail_btns">
                    <div class="tbl_right">
                        <button class="upload_btn" id="btn_regSettingChange" th:text="${#messages.msg('mgmt.content1.change.btn1')}">수정</button>
                    </div>
                </div>
                <div class="table_content tbl_accountDetail">
                    <table class="fileDetail_td">
                        <tbody>
                            <tr>
                                <th>[[${#messages.msg('mgmt.content2.Res1')}]]<span>*</span></th>
                                <td>
                                    <div class="input_container">
                                        <input type="text" th:placeholder="${#messages.msg('mgmt.content2.Res.placeholder1')}" id="settingTitleChange" th:value="${list[0].configName}" readonly="readonly">
                                    </div>
                                </td>
                            </tr>
                            <tr>
                                <th>[[${#messages.msg('mgmt.content2.Res2')}]]<span>*</span></th>
                                <td>
                                    <div class="input_container">
                                        <input type="text" th:placeholder="${#messages.msg('mgmt.content2.Res.placeholder2')}"  autocomplete='off' id="settingValueChange" th:value="${list[0].configValue}">
                                        <span class="guide_msg" id="valueChange">테스트</span>
                                    </div>
                                </td>
                            </tr>
                            <tr>
                                <th>[[${#messages.msg('mgmt.content2.Res3')}]]<span></span></th>
                                <td>
                                    <div class="input_container" >
                                        <input type="text" th:placeholder="${#messages.msg('mgmt.content2.Res.placeholder3')}"  id="settingDetailChange" th:value="${list[0].detail}">
                                    </div>
                                </td>
                            </tr>
                            <tr>
                                <th>[[${#messages.msg('mgmt.content2.Res4')}]]<span>*</span></th>
                                <td>
                                    <div class="select-container">
                                        <select name="search" class="custom-select" id="settingUseYnChange">
											<option th:value="'Y'" th:selected="${list[0].useYn == 'Y'}">O</option>
											<option th:value="'N'" th:selected="${list[0].useYn == 'N'}">X</option>
                                        </select>
                                    </div>
                                </td>
                            </tr>
                        </tbody>                    
                    </table>
                </div>
            </div>
            <!-- //파일관리 설정 등록 -->


        </div>
</div>
