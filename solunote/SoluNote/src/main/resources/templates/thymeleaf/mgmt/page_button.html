<div  class="tbl_btns" th:fragment="pageButtonFragment">
	<div class="left_btns">
	   <button th:if="${liveMenu} == '1'" id="btn_del" class="choice_btn" th:text="${#messages.msg('mgmt.page_button.btn3')}">선택제외</button>
	   <button th:if="${liveMenu} == '2'" id="btn_del" class="choice_btn" th:text="${#messages.msg('mgmt.page_button.btn4')}">선택복구</button>
	   <button th:if="${liveMenu} == '2'" id="btn_delP" class="choice_btn" th:text="${#messages.msg('minutes.page_button.btn4')}">영구삭제</button>
	   <button th:if="${liveMenu} == '4'" id="btn_delM" class="choice_btn" th:text="${#messages.msg('mgmt.page_button.btn2')}">선택삭제</button>	 
	   <button th:if="${liveMenu} == '5'" id="btn_delC" class="choice_btn" th:text="${#messages.msg('mgmt.page_button.btn2')}">선택삭제</button>	   	
	</div>
	<div class="tbl_right">
		<div class="table_total">[[${#messages.msg('minutes.page_button.page.span1')}]] <span id="tableTotal">0</span>[[${#messages.msg('minutes.page_button.page.span2')}]] </div>
		<div class="select-container">
			<select name="page_count" class="custom-select" id="page_count">
				<option value="10" th:text="${#messages.msg('minutes.page_button.page1')}">10개씩</option>
				<option value="30" th:text="${#messages.msg('minutes.page_button.page2')}">30개씩</option>
				<option value="50" th:text="${#messages.msg('minutes.page_button.page3')}">50개씩</option>
				<option value="100" th:text="${#messages.msg('minutes.page_button.page4')}">100개씩</option>
			</select>
		</div>
		<button th:if="${liveMenu == 1}" id="btn_several" class="upload_btn" th:text="${#messages.msg('mgmt.page_button.several.btn')}">다계정 등록</button>
		<button th:if="${liveMenu == 1 or liveMenu == 4 or liveMenu == 5}" id="btn_register" class="upload_btn" th:text="${#messages.msg('minutes.page_button.btn1')}">등록</button>		
	</div>
</div>
